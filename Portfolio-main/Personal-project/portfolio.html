<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link href="style.css" rel="stylesheet" type="text/css" media="all">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <link
    rel="stylesheet"
    href="https://unpkg.com/98.css"
    >
</head>
<body>
    <div class="title-bar">
        <div class="title-bar-text">Portfolio!</div>
        <div class="title-bar-controls">
          <button aria-label="Close"></button>
        </div>
      </div>
    <div class="portfolioBG">
        <img src="images/blob.png" aria-hidden = "true">
        </div>

    <img src="images/squareShape.png" aria-hidden="true" class="squareDeco">

    
    <div class="MainElmsContainer">
        <a href="index.html">
            <img src="images/homeBtn.png" class="homeBtn" aria-label="home" alt="Button to go to the home page">
        </a>

        <img src="images/bgSharpenedPlain.png" class="displayPortfolio" aria-hidden = "true">
        <img src="images/bear.png" class="bearPortfolio" aria-label='Bear' alt="A 3d render of a bear mascot">
    </div>

    <div class="portfolioText"> 
        <!-- This div will be populated by my Portfolio API -->
    </div>

    <script src="script.js"></script>
</body>
</html>
